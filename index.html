<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIM Report — Modern Intelligence</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>AIM Report</h1>
                <p>Audience Intelligence Metrics & Strategic Analysis</p>
            </div>
            <div class="header-controls">
                <label class="checkbox-label"><input type="checkbox" id="includeCreative"> 소재 분석</label>
                <label class="checkbox-label"><input type="checkbox" id="includeCampaign"> 캠페인 성과</label>
                <label class="checkbox-label"><input type="checkbox" id="includeCompetitor"> 경쟁사 분석</label>
                <button id="generateReport" class="btn-primary">리포트 생성</button>
            </div>
        </header>

        <main class="report-content">
            <section class="section">
                <h2 class="section-title">AIM 점수 요약</h2>
                <div class="score-summary" id="scoreSummary">
                    </div>
            </section>

            <div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                <section class="section">
                    <h2 class="section-title">월별 종합 AIM 추이</h2>
                    <div class="chart-container"><canvas id="monthlyChart"></canvas></div>
                </section>
                <section class="section">
                    <h2 class="section-title">퍼널별 성과 분포</h2>
                    <div class="chart-container"><canvas id="funnelComparisonChart"></canvas></div>
                </section>
            </div>

            <section class="section">
                <h2 class="section-title">퍼널별 핵심 키워드 클라우드</h2>
                <div class="keyword-clouds">
                    </div>
            </section>

            <div id="extendedSections">
                <section class="section" id="creativeSection" style="display: none;"><h2 class="section-title">소재 성과</h2><div id="creativeAnalysis"></div></section>
                <section class="section" id="campaignSection" style="display: none;"><h2 class="section-title">캠페인 성과</h2><div id="campaignAnalysis"></div></section>
                <section class="section" id="competitorSection" style="display: none;"><h2 class="section-title">경쟁사 분석</h2><div id="competitorAnalysis"></div></section>
            </div>

            <div class="insights-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                <section class="section"><h2 class="section-title">AI 인사이트</h2><div id="insights"></div></section>
                <section class="section"><h2 class="section-title">Next Step 전략</h2><div id="actionPlan"></div></section>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://chir.ag/projects/wordcloud/wordcloud2.js"></script>
    <script src="./assets/js/chart.js" defer></script>
    <script src="./assets/js/funnel.js" defer></script>
    <script src="./assets/js/main.js" defer></script>
</body>
</html>
